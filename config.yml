            description: "ブラックボックス最適化と進化計算の研究に取り組んでいる博士後期課程の学生です。"
            profileMode:
                  enabled: true
                  title: 池田晃毅
                  subtitle: "東京科学大学 情報工学系の博士後期課程学生です。ブラックボックス最適化と進化計算、特に混合変数ブラックボックス最適化問題のための CMA-ES に基づく進化計算手法を研究しています。科学・工学・産業応用に広く現れる最適化問題の解決を目指し、基礎的な理解から手法開発、実問題への応用まで一貫して取り組むことに関心があります。これまで、リサーチアシスタントとして富士通株式会社などとの共同研究に従事し、提案手法の実問題への応用にも取り組んできました。もし研究に関する議論やご相談などがありましたら、アカデミア・企業を問わず、お気軽にご連絡ください。"
                  imageUrl: "picture.jpeg"
                  imageWidth: 160
                  imageHeight: 160
                  buttons:
                    - name: 研究紹介
                      url: research/
                    - name: 研究業績
                      url: publications/
